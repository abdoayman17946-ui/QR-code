<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة الفرح والحنة</title>
    <!-- استدعاء مكتبة الأيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خطوط جوجل لتحسين المظهر -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(220, 180, 111, 0.3); /* إطار ذهبي خفيف */
        }

        .title {
            color: #4a4a4a;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #8e8e8e;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .custom-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px;
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* تأثير عند تحريك الماوس فوق الأزرار */
        .custom-btn:hover {
            transform: translateY(-3px);
        }

        .btn-henna:hover {
            border-color: #ff7597; /* لون وردي للحنة */
            box-shadow: 0 8px 15px rgba(255, 117, 151, 0.15);
        }

        .btn-wedding:hover {
            border-color: #d4af37; /* لون ذهبي للفرح */
            box-shadow: 0 8px 15px rgba(212, 175, 55, 0.15);
        }

        .icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            font-size: 20px;
        }

        /* ألوان الأيقونات والخلفيات الخاصة بها */
        .henna-icon {
            background-color: #fff0f3;
            color: #ff7597; /* وردي */
        }

        .wedding-icon {
            background-color: #fff9e6;
            color: #d4af37; /* ذهبي */
        }

        .arrow-icon {
            color: #b0b0b0;
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .custom-btn:hover .arrow-icon {
            transform: translateX(-5px); /* حركة السهم جهة اليمين عند الهوفر */
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <h1 class="title">أهلاً بكم في فرحتنا</h1>
        <p class="subtitle">يسعدنا انضمامكم إلينا ومشاركتنا أجمل اللحظات</p>

        <div class="buttons-wrapper">
            
            <!-- أولاً: زر موعد الحنة (استبدل النص بالرابط الخاص بك) -->
            <a href="https://ahmed-hager-henaa-ajcl.vercel.app/" target="_blank" class="custom-btn btn-henna">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-wrap henna-icon">
                        <i class="fa-solid fa-heart"></i> <!-- أيقونة القلب -->
                    </div>
                    <span>موعد الحنة</span>
                </div>
                <i class="fa-solid fa-chevron-left arrow-icon"></i>
            </a>

            <!-- ثانياً: زر موعد الفرح (استبدل النص بالرابط الخاص بك) -->
            <a href="https://ahmed-hager-aosq.vercel.app/" target="_blank" class="custom-btn btn-wedding">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="icon-wrap wedding-icon">
                        <i class="fa-solid fa-ring"></i> <!-- أيقونة الخاتم -->
                    </div>
                    <span>موعد الفرح</span>
                </div>
                <i class="fa-solid fa-chevron-left arrow-icon"></i>
            </a>

        </div>
    </div>

</body>
</html>
