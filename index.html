<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة الفرح والحنة</title>
    <!-- استدعاء مكتبة الأيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خطوط جوجل الاحترافية الناعمة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;500;700&family=Amiri:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Alexandria', sans-serif;
            /* خلفية ناعمة جداً مريحة للعين تعكس الفخامة الهادئة */
            background: linear-gradient(135deg, #f4f4f6 0%, #e9e9ed 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card-container {
            background: #ffffff;
            padding: 55px 40px;
            border-radius: 28px;
            /* ظلال ناعمة جداً وطبيعية بدون حدة */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.04), 0 10px 20px rgba(0, 0, 0, 0.02);
            text-align: center;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(230, 230, 235, 0.8); 
        }

        .title {
            font-family: 'Amiri', serif;
            color: #2d2d2e;
            font-size: 36px;
            margin-bottom: 14px;
            font-weight: normal;
        }

        .subtitle {
            color: #8a8a93;
            font-size: 13.5px;
            margin-bottom: 45px;
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        .buttons-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .custom-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 16.5px;
            font-weight: 500;
            /* حركة انتقالية ناعمة جداً فائقة الاحترافية */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        background-color 0.4s ease, 
                        box-shadow 0.4s ease,
                        border-color 0.4s ease;
            position: relative;
        }

        /* --- 1. زر موعد الحنة (Dusty Rose & Earthy Tones) --- */
        .btn-henna {
            background-color: #fcf6f6;
            color: #8c5858;
            border: 1px solid #f3e6e6;
        }

        .btn-henna:hover {
            transform: translateY(-4px);
            background-color: #f7ebeb;
            border-color: #e3cdcd;
            box-shadow: 0 12px 25px rgba(140, 88, 88, 0.06);
        }

        .btn-henna .icon-wrap {
            background: #f5e6e6;
            color: #8c5858;
        }

        /* --- 2. زر موعد الفرح (Champagne Gold & Warm Ivory) --- */
        .btn-wedding {
            background-color: #fbf9f3;
            color: #8f7647;
            border: 1px solid #f3ede0;
        }

        .btn-wedding:hover {
            transform: translateY(-4px);
            background-color: #f7f2e6;
            border-color: #e6dac1;
            box-shadow: 0 12px 25px rgba(143, 118, 71, 0.06);
        }

        .btn-wedding .icon-wrap {
            background: #f3ede0;
            color: #8f7647;
        }

        /* --- العناصر المشتركة للأيقونات --- */
        .icon-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .custom-btn:hover .icon-wrap {
            transform: scale(1.05);
        }

        .arrow-icon {
            color: #b5b5be;
            font-size: 13px;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .custom-btn:hover .arrow-icon {
            transform: translateX(-4px);
            color: inherit; /* بيأخد نفس لون النص الرئيسي للزر عند الهوفر */
        }
    </style>
</head>
<body>

    <div class="card-container">
        <h1 class="title">أهلاً بكم في فرحتنا</h1>
        <p class="subtitle">يسعدنا انضمامكم إلينا ومشاركتنا أجمل اللحظات</p>

        <div class="buttons-wrapper">
            
            <!-- زر موعد الحنة بستايل الـ Dusty Rose -->
            <a href="https://ahmed-hager-henaa-ajcl.vercel.app/" target="_blank" class="custom-btn btn-henna">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="icon-wrap">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                    <span>موعد الحنة</span>
                </div>
                <i class="fa-solid fa-chevron-left arrow-icon"></i>
            </a>

            <!-- زر موعد الفرح بستايل الـ Champagne Gold -->
            <a href="https://ahmed-hager-aosq.vercel.app/" target="_blank" class="custom-btn btn-wedding">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="icon-wrap">
                        <i class="fa-solid fa-ring"></i>
                    </div>
                    <span>موعد الفرح</span>
                </div>
                <i class="fa-solid fa-chevron-left arrow-icon"></i>
            </a>

        </div>
    </div>

</body>
</html>
